<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Isaac's Art Gallery</title>
        <link href="./style.css" rel="stylesheet"/>
        <link href="./hey_icon_transparent.png" rel="icon">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

        <script type="module" src="./script.js"></script>
    </head>
    <body>
        <header class="header">
            <div class="icon-container">
                <img class="icon" src="./hey.png" alt="hey">
                <img class="icon wink" src="./hey_wink.png" alt="hey_wink">
            </div>
            <h2>Isaac's Art Gallery</h2>
        </header>
        <div class="mainpage">
            <div class="options">
                <div class="options-header">
                    <h3>Options</h3>
                </div>
                <div class="options-content">
                    <p>Option 1</p>
                    <p>Option 2</p>
                    <p>Option 3</p>
                </div>
            </div>
            <div id="card-column-0" class="card-column"></div>
            <div id="card-column-1" class="card-column"></div>
            <div id="card-column-2" class="card-column"></div>
        </div>
        <div id="card-template" class="card" style="display: none;">
            <img src="">
            <div class="card-overlay">
                <div class="card-stats">
                    <img src="./assets/views.svg" alt="views" class="svg-icon">
                    <p></p>
                    <img src="./assets/likes.svg" alt="likes" class="svg-icon">
                    <p></p>
                </div>
                <h4></h4>
            </div>
        </div>
        <div class="footer">
            <button onclick="quoteAlert()">Get A Quote!</button>
            <button onclick="removeLastCard()">Remove A Card!</button>
        </div>
    </body>
</html>
