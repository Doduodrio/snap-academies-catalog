<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Isaac's Art Gallery</title>
        <link href="./style.css" rel="stylesheet"/>
        <link href="./hey_icon_transparent.png" rel="icon">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

        <script type="module" src="./script.js"></script>
    </head>
    <body>
        <header class="header">
            <div class="icon-container">
                <img class="icon" src="./hey.png" alt="hey">
                <img class="icon wink" src="./hey_wink.png" alt="hey_wink">
            </div>
            <h2>Isaac's Art Gallery</h2>
        </header>
        <div id="mainpage">
            <div class="overview">
                <div class="overview-header">
                    <h3>Overview</h3>
                </div>
                <div class="overview-content">
                    <p>Welcome to my gallery!</p>
                </div>
            </div>
            <div class="mainpage-content">
                <div class="sort-filter-menu">
                    <button id="sort-button"><img src="./assets/sort.svg" alt="sort">Sort</button>
                    <form id="sort-menu" class="hidden">
                        <label><input type="radio" name="sort" value="0" checked>Newest</label>
                        <label><input type="radio" name="sort" value="1">Oldest</label>
                        <label><input type="radio" name="sort" value="2">Most Liked</label>
                        <label><input type="radio" name="sort" value="3">Most Viewed</label>
                    </form>
                    <select name="Options">
                        <option value="Option 1">Option 1</option>
                        <option value="Option 2">Option 2</option>
                        <option value="Option 3">Option 3</option>
                    </select>
                    <select name="Other Options">
                        <option value="Option 1">Option 1</option>
                        <option value="Option 2">Option 2</option>
                        <option value="Option 3">Option 3</option>
                    </select>
                    <select name="Other Other Options">
                        <option value="Option 1">Option 1</option>
                        <option value="Option 2">Option 2</option>
                        <option value="Option 3">Option 3</option>
                    </select>
                </div>
                <div class="card-column-container">
                    <div id="card-column-0" class="card-column"></div>
                    <div id="card-column-1" class="card-column"></div>
                    <div id="card-column-2" class="card-column"></div>
                </div>
            </div>
        </div>
        <div id="full-display" style="display: none;">
            <div class="main-image">
                <img>
            </div>
            <div class="sidebar" style="display: none;">
                <div class="sidebar-header">
                    <h2></h2>
                    <button title="Close sidebar"><img src="./assets/close.svg" alt="close"></button>
                </div>
                <div class="card-stats">
                    <div class="card-stat">
                        <img src="./assets/views.svg" alt="views" class="svg-icon">
                        <p></p>
                    </div>
                    <div class="card-stat">
                        <img src="./assets/likes.svg" alt="likes" class="svg-icon">
                        <p></p>
                    </div>
                    <div class="card-stat">
                        <img src="./assets/calendar.svg" alt="date" class="svg-icon">
                        <time></time>
                    </div>
                </div>
                <p></p>
            </div>
            <div id="display-footer">
                <div class="zoom">
                    <button><img class="svg-icon" src="./assets/minus.svg" alt="minus" title="Zoom out"></button>
                    <button><img class="svg-icon" src="./assets/plus.svg" alt="plus" title="Zoom in"></button>
                </div>
            </div>
            <button class="close-button" title="Close"><img src="./assets/close.svg" alt="close"></button>
            <button class="info-button" title="Details"><img src="./assets/info.svg" alt="details"></button>
        </div>
        <div id="card-template" class="card" style="display: none;">
            <img src="">
            <div class="card-overlay">
                <div class="card-stats">
                    <div class="card-stat">
                        <img src="./assets/views.svg" alt="views" class="svg-icon">
                        <p></p>
                    </div>
                    <div class="card-stat">
                        <img src="./assets/likes.svg" alt="likes" class="svg-icon">
                        <p></p>
                    </div>
                    <div class="card-stat">
                        <img src="./assets/calendar.svg" alt="date" class="svg-icon">
                        <p></p>
                    </div>
                </div>
                <h4></h4>
            </div>
        </div>
    </body>
</html>
